version: "3.0"
services:
    frontend:
        build:
            context: ./frontend
            dockerfile: ../docker/frontend/Dockerfile
        volumes:
            - ./frontend:/frontend
            - /frontend/node_modules
        ports:
            - "127.0.0.1:4200:4200"
        depends_on:
            - backend

    backend:
        build:
            context: .
            dockerfile: ./docker/fastapi_backend/Dockerfile
        environment:
            - PLANWISE_DATABASE_URL=mysql+pymysql://innolab:innolab@mariadb_database:3306/project_calculation
            - PLANWISE_API_BASE_URL=http://127.0.0.1:8080
            - PLANWISE_STORAGE_PUBLIC_PATH=/app_storage/public
        volumes:
            - ./backend_fastapi:/backend_fastapi
            - ./storage/app/public:/app_storage/public
        ports:
            - "127.0.0.1:8080:80"
        depends_on:
            - mariadb_database

    mariadb_database:
        image: mariadb:10.11
        volumes:
            - ./docker/_vol/mariadb_database:/var/lib/mysql
        environment:
            - MYSQL_ROOT_PASSWORD=raspberry
            - MYSQL_DATABASE=project_calculation
            - MYSQL_USER=innolab
            - MYSQL_PASSWORD=innolab
        ports:
            - "127.0.0.1:3306:3306"
