<p-dropdown id="company" formControlName="company"
            [options]="companyService.models$ | async" optionLabel="name" placeholder="Auswählen">
  <ng-template let-company pTemplate="item">
    <div class="flex align-items-center gap-2">
      <span *ngIf="company.image_url" class="company-logo-option">
        <img [src]="company.image_url" alt="Company Image">
      </span>
      <div>{{ company.name }}</div>
    </div>
  </ng-template>
</p-dropdown>
